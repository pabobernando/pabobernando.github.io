<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./index.css">
  <title>Frontend Mentor | Order summary card</title>
</head>

<body>
  <div class="container-img">
    <img src="./images/illustration-hero.svg" alt="">
    <h1>Order Summary</h1>
    <p>You can now listen to millions of songs,</br>audiobooks,and podcasts on any device</br>anywhere you like!</p>
    <div class="container-avatar">
      <img src="./images/icon-music.svg" alt="" class="music">
      <h2>AnnualPlan</br><span>$59.99/year</span></h2>
      <div class="change">
        <h2><a href="#">Change</a></h2>
      </div>
    </div>
    <div class="boxBtn">
      <button class="btnViolet"><a href="#">Proceed to Payment</a></button>
    </div>
    <h4><a href="#">Cancel Order</a></h4>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Pabo Bernando</a>
  </div>
</body>

</html>
