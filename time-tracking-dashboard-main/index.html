<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./index.css">
  <title>Frontend Mentor | Time tracking dashboard</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="box-profile">
      <div class="avatar">
        <img src="./images/image-jeremy.png" class="jeremyImg" alt="img-jeremy">
        <p class="report">Report for</p>
        <h1 class="textAvatar">Jeremy</br>Robson</h1>
        <div class="text-box">
          <input type="radio" value="daily" id="daily" checked onclick="changeFilter()" class="input-radio"
            name="filter">
          <label for="daily">daily</label>

          <input type="radio" id="weekly" value="weekly" onclick="changeFilter()" class="input-radio" name="filter">
          <label for="weekly">weekly</label>

          <input type="radio" id="monthly" value="monthly" onclick="changeFilter()" class="input-radio" name="filter">
          <label for="monthly">monthly</label>
        </div>
      </div>
    </div>

    <div class="time-box"></div>

  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Pabo Bernando</a>
  </div>

  <script src="./index.js"></script>
</body>

</html>
